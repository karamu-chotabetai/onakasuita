<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Rhythm Tiles 🎵</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Fredoka', sans-serif;
text-align:center;
background: linear-gradient(135deg,#ff9a9e,#a18cd1,#fbc2eb);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
color:white;
}

@keyframes bgMove{
0%{background-position:0%}
100%{background-position:100%}
}

#game{
width:320px;
height:520px;
margin:20px auto;
background:white;
border-radius:20px;
overflow:hidden;
position:relative;
}

.tile{
width:80px;
height:140px;
background:linear-gradient(45deg,#ff6ec4,#7873f5);
position:absolute;
border-radius:10px;
}

button{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:20px;
background:#ff6ec4;
color:white;
}

</style>
</head>

<body>

<h1>🎵 Rhythm Tiles 🎵</h1>
<div id="score">Score: 0</div>
<button onclick="startGame()">START</button>

<div id="game"></div>

<audio id="music" src="music.mp3"></audio>

<script>

const game=document.getElementById("game")
const music=document.getElementById("music")
const scoreText=document.getElementById("score")

let tiles=[]
let score=0
let running=false
let speed=3

/* ビート（秒）※ここで譜面を決める */
const beatMap=[
1,1.5,2,2.5,3,3.5,
4,4.5,5,5.5,6,
7,7.5,8,8.5,9
]

let beatIndex=0

/* タイル生成 */
function createTile(){

const tile=document.createElement("div")
tile.className="tile"

let col=Math.floor(Math.random()*4)

tile.style.left=(col*80)+"px"
tile.style.top="-140px"
tile.dataset.hit="false"

game.appendChild(tile)
tiles.push(tile)

}

/* 音楽同期 */
function sync(){

if(!running)return

let t=music.currentTime

if(beatIndex<beatMap.length && t>=beatMap[beatIndex]){
createTile()
beatIndex++
}

requestAnimationFrame(sync)

}

/* 動き */
function update(){

if(!running)return

tiles.forEach(tile=>{

let top=parseFloat(tile.style.top)
top+=speed
tile.style.top=top+"px"

if(top>520 && tile.dataset.hit==="false"){
gameOver()
}

})

requestAnimationFrame(update)

}

/* タッチ */
game.addEventListener("touchstart",handle,{passive:false})
game.addEventListener("mousedown",handle)

function handle(e){

e.preventDefault()
if(!running)return

let rect=game.getBoundingClientRect()
let x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left
let y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top

let hit=false

tiles.forEach(tile=>{

let tRect=tile.getBoundingClientRect()

let tx=tRect.left-rect.left
let ty=tRect.top-rect.top

if(x>tx && x<tx+80 && y>ty && y<ty+140){

hit=true
tile.dataset.hit="true"

score++
scoreText.innerText="Score: "+score

tile.remove()

}

})

tiles=tiles.filter(t=>document.body.contains(t))

if(!hit) gameOver()

}

/* 開始 */
function startGame(){

tiles.forEach(t=>t.remove())
tiles=[]

score=0
scoreText.innerText="Score: 0"

running=true
beatIndex=0

music.currentTime=0
music.play()

sync()
update()

}

/* 終了 */
function gameOver(){

running=false
music.pause()

alert("Game Over\nScore: "+score)

tiles.forEach(t=>t.remove())
tiles=[]

}

</script>

</body>
</html>
