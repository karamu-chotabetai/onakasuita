<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Rhythm Tiles Ultimate 🎵</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Fredoka',sans-serif;
text-align:center;
color:white;
background:linear-gradient(270deg,#ff6ec4,#7873f5,#00dbde,#fc00ff);
background-size:600% 600%;
animation:bg 10s infinite;
}
@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

h1{margin:10px;}

#game{
width:320px;
height:520px;
margin:20px auto;
background:#fff;
border-radius:20px;
overflow:hidden;
position:relative;
touch-action:none;
}

.tile{
width:80px;
height:140px;
position:absolute;
border-radius:12px;
background:linear-gradient(45deg,#ff6ec4,#7873f5);
}

.effect{
position:absolute;
width:80px;
height:140px;
background:rgba(255,255,0,0.5);
border-radius:12px;
animation:pop 0.3s;
}
@keyframes pop{
to{transform:scale(1.5);opacity:0}
}

#judge{
font-size:28px;
height:40px;
}

button,input{
margin:5px;
padding:8px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<h1>🎵 Rhythm Tiles 🎵</h1>

<div id="score">Score: 0</div>
<div id="highscore">HighScore: 0</div>
<div id="judge"></div>

<input type="file" id="file" accept="audio/*">
<br>
<button onclick="startGame()">START</button>

<div id="game"></div>

<script>

const game=document.getElementById("game")
const scoreText=document.getElementById("score")
const highscoreText=document.getElementById("highscore")
const judgeText=document.getElementById("judge")

let audio=new Audio()
let tiles=[]
let score=0
let running=false
let speed=3

let highscore=localStorage.getItem("hs")||0
highscoreText.innerText="HighScore: "+highscore

/* 🎧 音楽選択 */
document.getElementById("file").onchange=e=>{
let file=e.target.files[0]
audio.src=URL.createObjectURL(file)
}

/* 🎹 タイル生成 */
function createTile(){
let tile=document.createElement("div")
tile.className="tile"

let col=Math.floor(Math.random()*4)
tile.style.left=(col*80)+"px"
tile.style.top="-140px"
tile.dataset.time=audio.currentTime

game.appendChild(tile)
tiles.push(tile)
}

/* 🎵 安定版リズム生成（←ここが重要） */
function autoBeat(){

if(!running)return

let t = audio.currentTime

if(!window.lastBeat) window.lastBeat = 0

// 一定間隔でタイル出す（安定）
if(t - window.lastBeat > 0.5){
createTile()
window.lastBeat = t
}

requestAnimationFrame(autoBeat)

}

/* 🎯 判定 */
function judge(tile){

let diff=Math.abs(audio.currentTime - tile.dataset.time)

if(diff<0.2) return "PERFECT"
if(diff<0.4) return "GOOD"
return "MISS"

}

/* 🌈 エフェクト */
function effect(x,y){
let e=document.createElement("div")
e.className="effect"
e.style.left=x+"px"
e.style.top=y+"px"
game.appendChild(e)
setTimeout(()=>e.remove(),300)
}

/* 👆 入力 */
game.addEventListener("touchstart",handle,{passive:false})
game.addEventListener("mousedown",handle)

function handle(e){

e.preventDefault()
if(!running)return

let rect=game.getBoundingClientRect()
let x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left
let y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top

let hit=false

tiles.forEach(tile=>{

let tRect=tile.getBoundingClientRect()

if(x>tRect.left-rect.left && x<tRect.right-rect.left &&
y>tRect.top-rect.top && y<tRect.bottom-rect.top){

hit=true

let j=judge(tile)
judgeText.innerText=j

if(j==="PERFECT") score+=3
else if(j==="GOOD") score+=1

scoreText.innerText="Score: "+score

effect(tRect.left-rect.left,tRect.top-rect.top)

tile.remove()

}

})

tiles=tiles.filter(t=>document.body.contains(t))

if(!hit){
judgeText.innerText="MISS"
}

}

/* ⬇️ 落下 */
function update(){

if(!running)return

tiles.forEach(tile=>{

let top=parseFloat(tile.style.top)
top+=speed
tile.style.top=top+"px"

if(top>520){
gameOver()
}

})

requestAnimationFrame(update)

}

/* ▶️ 開始 */
function startGame(){

if(!audio.src){
alert("音楽を選んでください！")
return
}

tiles.forEach(t=>t.remove())
tiles=[]

score=0
scoreText.innerText="Score: 0"

running=true
window.lastBeat=0

audio.currentTime=0
audio.play()

autoBeat()
update()

}

/* ⛔ 終了 */
function gameOver(){

running=false
audio.pause()

if(score>highscore){
highscore=score
localStorage.setItem("hs",highscore)
}

highscoreText.innerText="HighScore: "+highscore

alert("Game Over\nScore: "+score)

tiles.forEach(t=>t.remove())
tiles=[]

}

</script>

</body>
</html>
